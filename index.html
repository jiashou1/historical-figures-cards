<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史人物小卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            position: relative;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 设置按钮 */
        .settings-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255,255,255,0.2);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .settings-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .settings-btn.configured {
            background: rgba(76, 175, 80, 0.4);
        }

        .name-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .person-name {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .btn-refresh {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-refresh:active {
            transform: translateY(0);
        }

        .btn-refresh:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .count-info {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }

        /* 内容卡片 */
        .content-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .content-card h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            color: #333;
        }

        .ai-content {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            min-height: 200px;
        }

        /* 基本信息 */
        .basic-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .basic-info {
                grid-template-columns: 1fr;
            }
        }

        .info-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1rem;
            color: #333;
            font-weight: 500;
        }

        /* 时间线 */
        .timeline {
            margin-top: 20px;
        }

        .timeline-item {
            position: relative;
            padding-left: 30px;
            padding-bottom: 25px;
            border-left: 2px solid #e0e0e0;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
            border-left-color: transparent;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 0;
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
        }

        .timeline-year {
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .timeline-age {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 5px;
        }

        .timeline-source {
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .timeline-desc {
            color: #555;
            line-height: 1.7;
        }

        /* 置信度颜色 */
        .confidence-high {
            color: #4caf50;
        }

        .confidence-medium {
            color: #ff9800;
        }

        .confidence-low {
            color: #f44336;
        }

        .confidence-dot-high::before {
            content: '🟢';
            margin-right: 4px;
        }

        .confidence-dot-medium::before {
            content: '🟡';
            margin-right: 4px;
        }

        .confidence-dot-low::before {
            content: '🔴';
            margin-right: 4px;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading-dots::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ddd;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 流式输出光标 */
        .streaming-cursor::after {
            content: '▌';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .no-content {
            text-align: center;
            padding: 30px;
            color: #999;
            font-style: italic;
        }

        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #333;
        }

        .modal p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
        }

        .modal input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 15px;
            transition: border-color 0.2s;
        }

        .modal input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-btn-cancel {
            background: #e0e0e0;
            color: #666;
        }

        .modal-btn-cancel:hover {
            background: #d0d0d0;
        }

        .modal-btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn-save:hover {
            opacity: 0.9;
        }

        .modal-link {
            font-size: 0.85rem;
            color: #667eea;
            text-decoration: none;
        }

        .modal-link:hover {
            text-decoration: underline;
        }

        /* 错误提示 */
        .error {
            text-align: center;
            padding: 30px;
            color: #e53935;
            background: #ffebee;
            border-radius: 10px;
        }

        /* 底部提示 */
        .footer {
            text-align: center;
            color: white;
            margin-top: 20px;
            opacity: 0.9;
        }

        .footer-notice {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .footer-notice-warning {
            margin-bottom: 10px;
        }

        .footer-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }

        .footer-info {
            font-size: 0.85rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="settings-btn" id="settingsBtn" onclick="openSettingsModal()" title="设置 API Key">
                <svg viewBox="0 0 24 24">
                    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                </svg>
            </button>
            <h1>🎲 历史人物小卡片</h1>
            <p>每天认识一位历史人物</p>
        </div>

        <div class="name-card">
            <div class="person-name" id="personName">点击下方按钮开始</div>
            <div class="count-info" id="countInfo"></div>
            <button class="btn-refresh" id="refreshBtn" onclick="loadRandomFigure()">
                换一个
            </button>
        </div>

        <div class="content-card">
            <h2>📜 人物生平</h2>
            <div class="ai-content" id="aiContent">
                <div class="no-content">点击"换一个"按钮开始探索</div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-notice">
                <div class="footer-notice-warning">
                    ⚠️ <strong>温馨提示</strong>：本内容由 AI 生成，可能存在事实性错误，请以正规史料为准，仅供参考学习。
                </div>
                <div class="footer-legend">
                    <span class="legend-item"><span>🟢</span> 高置信度</span>
                    <span class="legend-item"><span>🟡</span> 中置信度</span>
                    <span class="legend-item"><span>🔴</span> 低置信度/存疑</span>
                </div>
            </div>
            <div class="footer-info">
                数据来源：历史名人大全 | AI 模型：通义千问 qwen-max
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3>⚙️ 设置 API Key</h3>
            <p>
                请输入你的通义千问 API Key。<br>
                <a href="https://dashscope.console.aliyun.com/apiKey" target="_blank" class="modal-link">点击这里获取 API Key</a>
            </p>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
            <p style="font-size: 0.8rem; color: #999; margin-bottom: 15px;">
                API Key 将保存在浏览器本地，不会上传到任何服务器。
            </p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeSettingsModal()">取消</button>
                <button class="modal-btn modal-btn-save" onclick="saveApiKey()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 历史人物数据
        const FIGURES = [];

        // DOM 元素
        const personNameEl = document.getElementById('personName');
        const countInfoEl = document.getElementById('countInfo');
        const aiContentEl = document.getElementById('aiContent');
        const refreshBtn = document.getElementById('refreshBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // 当前人物
        let currentName = '';
        // API Key
        let apiKey = '';
        // 是否正在预加载
        let isPrefetching = false;

        // ==================== 缓存管理 ====================

        const PREFETCH_KEY = 'prefetched_figure';

        // 保存预加载数据
        function savePrefetchedData(name, data) {
            try {
                localStorage.setItem(PREFETCH_KEY, JSON.stringify({
                    name: name,
                    data: data,
                    timestamp: Date.now()
                }));
                console.log(`已缓存人物: ${name}`);
            } catch (e) {
                console.error('缓存保存失败:', e);
            }
        }

        // 获取预加载数据
        function getPrefetchedData() {
            try {
                const cached = localStorage.getItem(PREFETCH_KEY);
                if (!cached) return null;

                const parsed = JSON.parse(cached);
                // 缓存不限时
                return parsed;
            } catch (e) {
                return null;
            }
        }

        // 清除预加载数据
        function clearPrefetchedData() {
            localStorage.removeItem(PREFETCH_KEY);
        }

        // ==================== 初始化 ====================

        function init() {
            loadApiKey();
            loadFiguresData().then(() => {
                // 数据加载完成后，检查是否有预加载数据
                if (apiKey) {
                    const cached = getPrefetchedData();
                    if (cached) {
                        // 有缓存，立即展示
                        displayCachedFigure(cached);
                        // 后台预加载下一个
                        prefetchNextFigure();
                    } else {
                        // 无缓存，显示引导
                        showWelcomeMessage();
                        // 后台预加载
                        prefetchNextFigure();
                    }
                } else {
                    showWelcomeMessage();
                }
            });
        }

        // 显示欢迎消息
        function showWelcomeMessage() {
            personNameEl.textContent = '点击下方按钮开始';
            countInfoEl.textContent = `（共 ${FIGURES.length} 位历史人物）`;
            aiContentEl.innerHTML = '<div class="no-content">点击"换一个"按钮开始探索</div>';
        }

        // 显示缓存的人物
        function displayCachedFigure(cached) {
            currentName = cached.name;
            personNameEl.textContent = cached.name;
            countInfoEl.textContent = `（共 ${FIGURES.length} 位历史人物）`;
            renderContent(cached.data);
        }

        // ==================== API Key 管理 ====================

        function loadApiKey() {
            apiKey = localStorage.getItem('qwen_api_key') || '';
            updateSettingsBtnState();
            if (apiKey) {
                apiKeyInput.value = apiKey;
            }
        }

        function updateSettingsBtnState() {
            if (apiKey) {
                settingsBtn.classList.add('configured');
            } else {
                settingsBtn.classList.remove('configured');
            }
        }

        function openSettingsModal() {
            apiKeyInput.value = apiKey;
            settingsModal.classList.add('active');
        }

        function closeSettingsModal() {
            settingsModal.classList.remove('active');
        }

        function saveApiKey() {
            const key = apiKeyInput.value.trim();
            if (!key) {
                alert('请输入 API Key');
                return;
            }
            apiKey = key;
            localStorage.setItem('qwen_api_key', key);
            updateSettingsBtnState();
            closeSettingsModal();

            // 保存 API Key 后，开始预加载
            if (FIGURES.length > 0) {
                const cached = getPrefetchedData();
                if (cached) {
                    displayCachedFigure(cached);
                    prefetchNextFigure();
                } else {
                    prefetchNextFigure();
                }
            }
        }

        // ==================== 随机人物 ====================

        function getRandomFigure(excludeName = null) {
            if (FIGURES.length === 0) return null;
            if (FIGURES.length === 1) return FIGURES[0];

            let name;
            do {
                const index = Math.floor(Math.random() * FIGURES.length);
                name = FIGURES[index];
            } while (name === excludeName);

            return name;
        }

        // ==================== UI 渲染 ====================

        function showLoading() {
            aiContentEl.innerHTML = '<div class="loading">AI 正在生成内容...<span class="loading-dots"></span></div>';
        }

        function showError(message) {
            aiContentEl.innerHTML = `<div class="error">${message}</div>`;
        }

        function getReliabilityClass(reliability) {
            const r = reliability?.toLowerCase();
            if (r === '高') return 'confidence-high confidence-dot-high';
            if (r === '中') return 'confidence-medium confidence-dot-medium';
            return 'confidence-low confidence-dot-low';
        }

        // 渲染基本信息（新结构：metadata）
        function renderBasicInfo(metadata) {
            const { name, dynasty, years, tags } = metadata;

            // 格式化生卒年
            let birthDeathStr = '不详';
            if (years && (years.birth || years.death)) {
                const birth = years.birth ? (years.birth < 0 ? `公元前${Math.abs(years.birth)}年` : `${years.birth}年`) : '?';
                const death = years.death ? (years.death < 0 ? `公元前${Math.abs(years.death)}年` : `${years.death}年`) : '?';
                birthDeathStr = `${birth} — ${death}`;
                if (years.isApproximate) {
                    birthDeathStr += '（约）';
                }
            }

            // 格式化标签
            const tagsStr = tags && tags.length > 0 ? tags.join('、') : '不详';

            const html = `
                <div class="basic-info">
                    <div class="info-item">
                        <div class="info-label">姓名</div>
                        <div class="info-value confidence-high confidence-dot-high">${name || '不详'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">朝代</div>
                        <div class="info-value confidence-high confidence-dot-high">${dynasty || '不详'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">生卒年</div>
                        <div class="info-value confidence-medium confidence-dot-medium">${birthDeathStr}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">身份</div>
                        <div class="info-value confidence-high confidence-dot-high">${tagsStr}</div>
                    </div>
                </div>
            `;
            return html;
        }

        // 渲染生平时间线（新结构：biography）
        function renderTimeline(biography) {
            if (!biography || !biography.length) return '';

            let html = '<h3 style="margin: 20px 0 15px; color: #333;">【生平时间线】</h3>';
            html += '<div class="timeline">';

            biography.forEach(item => {
                const relClass = getReliabilityClass(item.reliability);

                // 格式化年份
                let yearStr = '年份不详';
                if (item.year && item.year !== 0) {
                    yearStr = item.year < 0 ? `公元前${Math.abs(item.year)}年` : `${item.year}年`;
                }

                // 格式化年龄
                let ageStr = '年龄不详';
                if (item.age !== undefined && item.age !== null) {
                    ageStr = `${item.age}岁`;
                }

                html += `
                    <div class="timeline-item">
                        <div class="timeline-year ${relClass}">${item.title || yearStr}</div>
                        <div class="timeline-age">${yearStr} · ${ageStr}</div>
                        <div class="timeline-source ${relClass}">出处：${item.source || '出处不详'}</div>
                        <div class="timeline-desc">${item.content || ''}</div>
                    </div>
                `;
            });

            html += '</div>';
            return html;
        }

        function renderStreamingText(text) {
            aiContentEl.innerHTML = `<div class="streaming-cursor">${text.replace(/\n/g, '<br>')}</div>`;
        }

        function renderContent(data) {
            try {
                const parsed = JSON.parse(data);

                let html = '';
                // 新结构：metadata + biography
                if (parsed.metadata) {
                    html += renderBasicInfo(parsed.metadata);
                }
                if (parsed.biography) {
                    html += renderTimeline(parsed.biography);
                }

                if (html) {
                    aiContentEl.innerHTML = html;
                } else {
                    aiContentEl.innerHTML = `<p>${data.replace(/\n/g, '<br>')}</p>`;
                }
            } catch (e) {
                aiContentEl.innerHTML = `<p>${data.replace(/\n/g, '<br>')}</p>`;
            }
        }

        // ==================== Prompt ====================

        function buildPrompt(name) {
            return `# Role
你是一位精通《二十四史》与考古发现的学术级历史学家。你的任务是为前端可视化系统提供结构化、高可信度的历史人物数据。

# Task
根据输入的「${name}」，生成其生平轨迹 JSON。

# Constraints
1. **真实性基准**：严禁编造对话和细节。若史料缺失，描述宁可简短（50-100字）也不得注水。
2. **计算逻辑**：
   - 必须先提取 birthYear（公历数字，公元前用负数）。
   - 事件 age = eventYear - birthYear（不计虚岁，仅作数值差）。
3. **JSON 稳定性**：
   - 禁止任何首尾废话。
   - 所有的 JSON Key 必须严格一致。
   - 遇到无法确定的年份，year 字段填写 0，并在 note 中说明。

# JSON Schema
{
  "metadata": {
    "name": "人物姓名",
    "dynasty": "所属朝代",
    "years": { "birth": 数字, "death": 数字, "isApproximate": 布尔值 },
    "tags": ["标签1", "标签2"]
  },
  "biography": [
    {
      "year": 数字,
      "age": 数字,
      "title": "事件短标题",
      "content": "深度描述：包含前因、核心经过、后果影响。要求客观平实，标注争议点。每个事件描述不少于150字。",
      "source": "具体史料篇名（如《史记·刺客列传》）",
      "reliability": "高"
    }
  ]
}

# Biography Requirements
1. 总计至少 8-12 个事件，覆盖完整人生阶段
2. 每个事件 content 不少于 150 字
3. reliability 只能是：高、中、低
4. source 必须具体到篇名，不确定写"出处不详"

请直接输出 JSON 字符串，不要有任何其他文字。`;
        }

        // ==================== API 调用 ====================

        function getApiUrl() {
            const apiEndpoint = 'https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation';
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            return isLocal ? apiEndpoint : `https://corsproxy.io/?url=${encodeURIComponent(apiEndpoint)}`;
        }

        // 调用 API（支持流式显示和静默预加载）
        async function callQwenAPI(name, options = {}) {
            const { silent = false, onStream = null } = options;

            if (!apiKey) {
                if (!silent) {
                    openSettingsModal();
                    showError('请先设置 API Key');
                }
                return null;
            }

            if (!silent) {
                showLoading();
            }

            const url = getApiUrl();
            const prompt = buildPrompt(name);

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 90000);

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                        'X-DashScope-SSE': 'enable'
                    },
                    body: JSON.stringify({
                        model: 'qwen-max',
                        input: {
                            messages: [
                                { role: 'user', content: prompt }
                            ]
                        },
                        parameters: {
                            enable_search: true,
                            result_format: 'message'
                        }
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    const errorText = await response.text();
                    let errorMsg = response.statusText;
                    try {
                        const errorData = JSON.parse(errorText);
                        errorMsg = errorData.message || errorData.code || errorData.error?.message || response.statusText;
                    } catch (e) {
                        errorMsg = errorText || response.statusText;
                    }

                    if (!silent) {
                        if (response.status === 400) {
                            showError(`请求参数错误<br><small>${errorMsg}</small>`);
                        } else if (response.status === 401 || response.status === 403) {
                            showError(`API Key 无效，请检查设置<br><small>${errorMsg}</small>`);
                        } else if (response.status === 429) {
                            showError(`请求过于频繁，请稍后再试<br><small>${errorMsg}</small>`);
                        } else {
                            showError(`API 调用失败 (${response.status})<br><small>${errorMsg}</small>`);
                        }
                    }
                    return null;
                }

                // 流式读取
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                const jsonStr = line.slice(5).trim();
                                if (!jsonStr || jsonStr === '[DONE]') continue;

                                const data = JSON.parse(jsonStr);
                                const content = data.output?.choices?.[0]?.message?.content ||
                                               data.output?.text || '';

                                if (content) {
                                    fullContent = content;
                                    // 流式显示（仅非静默模式）
                                    if (!silent && onStream) {
                                        onStream(fullContent);
                                    } else if (!silent) {
                                        renderStreamingText(fullContent);
                                    }
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }

                if (fullContent) {
                    const jsonMatch = fullContent.match(/\{[\s\S]*\}/);
                    const jsonData = jsonMatch ? jsonMatch[0] : fullContent;

                    if (!silent) {
                        renderContent(jsonData);
                    }

                    return jsonData;
                } else {
                    if (!silent) {
                        showError('AI 未返回有效内容');
                    }
                    return null;
                }

            } catch (error) {
                console.error('API call error:', error);
                clearTimeout(timeoutId);

                if (!silent) {
                    let errorMsg = '';
                    if (error.name === 'AbortError') {
                        errorMsg = '请求超时<br><small>请检查网络连接后重试</small>';
                    } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                        errorMsg = `网络请求失败<br><small>可能是 CORS 限制或网络问题</small>`;
                    } else {
                        errorMsg = `网络请求失败<br><small>${error.message}</small>`;
                    }
                    showError(errorMsg);
                }
                return null;
            }
        }

        // ==================== 预加载 ====================

        async function prefetchNextFigure() {
            if (isPrefetching || !apiKey || FIGURES.length === 0) return;

            isPrefetching = true;
            console.log('开始预加载下一个人物...');

            // 选择一个不同于当前人物的名字
            const nextName = getRandomFigure(currentName);

            const data = await callQwenAPI(nextName, { silent: true });

            if (data) {
                savePrefetchedData(nextName, data);
            }

            isPrefetching = false;
        }

        // ==================== 加载人物 ====================

        async function loadRandomFigure() {
            if (FIGURES.length === 0) {
                personNameEl.textContent = '数据加载中...';
                return;
            }

            if (!apiKey) {
                openSettingsModal();
                return;
            }

            refreshBtn.disabled = true;
            refreshBtn.textContent = '加载中...';

            // 先检查是否有预加载数据
            const cached = getPrefetchedData();

            if (cached && cached.name !== currentName) {
                // 有缓存且不是当前人物，立即展示
                displayCachedFigure(cached);
                refreshBtn.disabled = false;
                refreshBtn.textContent = '换一个';

                // 后台预加载下一个
                prefetchNextFigure();
            } else {
                // 无缓存或缓存过期，实时加载
                currentName = getRandomFigure(currentName);
                personNameEl.textContent = currentName;
                countInfoEl.textContent = `（共 ${FIGURES.length} 位历史人物）`;

                const data = await callQwenAPI(currentName);

                if (data) {
                    // 保存到缓存（以备下次使用）
                    savePrefetchedData(currentName, data);
                }

                refreshBtn.disabled = false;
                refreshBtn.textContent = '换一个';

                // 预加载下一个
                prefetchNextFigure();
            }
        }

        // ==================== 加载人物数据 ====================

        async function loadFiguresData() {
            try {
                const response = await fetch('figures.json');
                const data = await response.json();
                FIGURES.push(...data);
                console.log(`已加载 ${FIGURES.length} 位历史人物`);
            } catch (error) {
                console.error('Failed to load figures data:', error);
                personNameEl.textContent = '数据加载失败';
            }
        }

        // ==================== 事件监听 ====================

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                closeSettingsModal();
            }
        });

        // 初始化
        init();
    </script>
</body>
